<!DOCTYPE html>
<html lang="en" data-theme="deep">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>∴ star chart ∴</title>
<link rel="preconnect" href="https://fonts.bunny.net" crossorigin>
<link href="https://fonts.bunny.net/css?family=big-shoulders-display:700,900|jetbrains-mono:400,500|fraunces:400i&display=swap" rel="stylesheet">
<style>
:root{--void:#06070a;--signal:#8EE000;--signal-dim:#54781f;--signal-deep:#22300d;--red:#E63E21;--paper:#ECE6D7;
  --f-display:"Big Shoulders Display",system-ui,sans-serif;--f-mono:"JetBrains Mono",monospace;--f-ed:"Fraunces",Georgia,serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--f-mono);background:var(--void);color:var(--signal);min-height:100vh;
  text-shadow:0 0 6px rgba(142,224,0,0.3);overflow-x:hidden}
.vignette{position:fixed;inset:0;pointer-events:none;z-index:5;
  background:radial-gradient(120% 120% at 50% 50%,transparent 50%,rgba(0,0,0,0.8) 100%)}
.crt{position:fixed;inset:0;pointer-events:none;z-index:6;mix-blend-mode:overlay;
  background:repeating-linear-gradient(to bottom,rgba(0,0,0,0) 0 2px,rgba(0,0,0,0.28) 3px,rgba(0,0,0,0) 4px)}
.wrap{position:relative;z-index:10;max-width:900px;margin:0 auto;padding:clamp(20px,5vh,56px) clamp(16px,4vw,40px)}
.head{display:flex;justify-content:space-between;font-size:10px;letter-spacing:0.28em;text-transform:uppercase;
  color:var(--signal-dim);border-bottom:1px solid var(--signal-deep);padding-bottom:12px;margin-bottom:8px}
.head a{color:inherit;text-decoration:none;border-bottom:1px solid currentColor}
h1{font-family:var(--f-display);font-weight:900;font-size:clamp(40px,8vw,92px);line-height:0.86;
  letter-spacing:-0.03em;text-transform:uppercase;color:var(--paper);margin:18px 0 4px}
h1 em{font-family:var(--f-ed);font-style:italic;font-weight:400;color:var(--signal);text-transform:none}
.lede{font-size:12px;color:var(--signal-dim);max-width:56ch;line-height:1.7;margin-bottom:18px}
svg{width:100%;height:auto;display:block;filter:drop-shadow(0 0 8px rgba(142,224,0,0.15))}
.edge{stroke:var(--signal-deep);stroke-width:1.5}
.edge.lit{stroke:var(--signal);stroke-width:2;filter:drop-shadow(0 0 6px var(--signal))}
.star{fill:var(--void);stroke:var(--signal-deep);stroke-width:2}
.star.done{fill:var(--signal);stroke:var(--signal)}
.star.active{stroke:var(--signal);stroke-width:3;animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{r:9px}50%{r:13px}}
.lbl{fill:var(--signal-dim);font:500 11px var(--f-mono);letter-spacing:0.12em}
.lbl.done,.lbl.active{fill:var(--paper)}
.num{fill:var(--signal);font:900 13px var(--f-display)}
.legend{display:flex;gap:20px;flex-wrap:wrap;margin-top:20px;font-size:10px;letter-spacing:0.16em;
  text-transform:uppercase;color:var(--signal-dim)}
.cta{margin-top:26px;display:flex;gap:12px;flex-wrap:wrap}
button{padding:12px 22px;border:1px solid var(--signal);background:transparent;color:var(--signal);
  font-family:var(--f-mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;cursor:pointer;
  transition:background .18s,box-shadow .18s}
button:hover{background:var(--signal);color:var(--void);box-shadow:0 0 18px rgba(142,224,0,0.4)}
.ghost{border-color:var(--signal-deep);color:var(--signal-dim)}
.ghost:hover{background:var(--signal-deep);color:var(--paper);box-shadow:none}
.foot{margin-top:30px;font-size:9px;letter-spacing:0.24em;text-transform:uppercase;color:var(--signal-deep)}
</style>
</head>
<body>
<div class="vignette"></div><div class="crt"></div>
<main class="wrap">
  <div class="head"><span><a href="/">← surface</a></span><span>∴ 3301 ∴</span><span><a href="/signal">terminal →</a></span></div>
  <h1>the <em>descent</em></h1>
  <p class="lede">six points of light. each one is a lock you opened by doing, not by reading.
    this chart is drawn from your own terminal — it knows exactly how far down you've gone.</p>

  <svg id="chart" viewBox="0 0 800 320" role="img" aria-label="Descent star chart"></svg>

  <div class="legend">
    <span>○ unopened</span><span style="color:var(--signal)">◉ opened</span><span style="color:var(--paper)">⟡ current</span>
  </div>
  <div class="cta">
    <a href="/signal"><button type="button" id="resume">descend →</button></a>
    <a href="/#guestbook-real"><button class="ghost" type="button">sign the log</button></a>
  </div>
  <div class="foot" id="status">∴ reading your terminal…</div>
</main>

<script src="/chain.js"></script>
<script>
(function(){
  var NODES = [
    {n:'I',  k:'mine',     label:'carrier',  x:90,  y:240},
    {n:'II', k:'decrypt',  label:'burst',    x:220, y:120},
    {n:'III',k:'gematria', label:'gematria', x:370, y:230},
    {n:'IV', k:'prime',    label:'totient',  x:520, y:110},
    {n:'V',  k:'relic',    label:'relic',    x:650, y:225},
    {n:'VI', k:'solved',   label:'the log',  x:740, y:90},
  ];
  var st = {}; try{ st = (window.__chain && window.__chain.state()) || {}; }catch(e){}
  var done = st.steps_completed || [];
  var solved = !!(window.__chain && window.__chain.proof());
  // how far: index of first not-done
  var reached = 0;
  for (var i=0;i<NODES.length;i++){ if (done.indexOf(NODES[i].k)>=0 || (NODES[i].k==='solved'&&solved)) reached=i+1; }
  var svg = document.getElementById('chart');
  var NS='http://www.w3.org/2000/svg';
  function el(t,a){ var e=document.createElementNS(NS,t); for(var k in a)e.setAttribute(k,a[k]); return e; }
  // edges
  for (var i=0;i<NODES.length-1;i++){
    var a=NODES[i], b=NODES[i+1];
    var e=el('line',{x1:a.x,y1:a.y,x2:b.x,y2:b.y,class:'edge'+(i<reached?' lit':'')});
    svg.appendChild(e);
  }
  // stars + labels
  NODES.forEach(function(nd,i){
    var state = i<reached ? 'done' : (i===reached ? 'active' : '');
    var c = el('circle',{cx:nd.x,cy:nd.y,r:9,class:'star '+state});
    if (i<=reached) c.style.cursor='pointer', c.addEventListener('click',function(){location.href='/signal'});
    svg.appendChild(c);
    svg.appendChild(el('text',{x:nd.x,y:nd.y-20,'text-anchor':'middle',class:'num'})).textContent=nd.n;
    var lbl=el('text',{x:nd.x,y:nd.y+30,'text-anchor':'middle',class:'lbl '+state}); lbl.textContent=nd.label;
    svg.appendChild(lbl);
  });
  var status=document.getElementById('status');
  if (solved) status.innerHTML='∴ chain closed · '+done.length+'/6 locks · the proof is yours';
  else if (reached===0) status.innerHTML='∴ no descent yet · the terminal is dark';
  else status.innerHTML='∴ '+reached+'/6 opened · the next lock waits';
  document.getElementById('resume').textContent = solved ? 'revisit ∴' : (reached>0 ? 'resume descent →' : 'begin descent →');
})();
</script>
</body>
</html>
